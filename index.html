<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Crafter Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg:        var(--tg-theme-bg-color, #1a1a2e);
    --bg2:       var(--tg-theme-secondary-bg-color, #16213e);
    --text:      var(--tg-theme-text-color, #eaeaea);
    --hint:      var(--tg-theme-hint-color, #8b8fa8);
    --accent:    var(--tg-theme-button-color, #4f8ef7);
    --accent-t:  var(--tg-theme-button-text-color, #fff);
    --link:      var(--tg-theme-link-color, #6eb5ff);
    --sep:       rgba(255,255,255,0.07);

    --green:  #3ddc84;
    --yellow: #ffd166;
    --red:    #ef476f;
    --radius: 12px;
    --font:   'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- HEADER ---- */
  .header {
    background: var(--bg2);
    padding: 12px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--sep);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .sync-badge {
    font-size: 10px;
    color: var(--hint);
    background: var(--sep);
    padding: 2px 8px;
    border-radius: 20px;
  }
  .sync-badge.fresh { color: var(--green); }

  /* ---- GAME TABS ---- */
  .game-tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 0;
  }
  .game-tabs::-webkit-scrollbar { display: none; }
  .game-tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 8px 8px 0 0;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--hint);
    border: 1px solid transparent;
    border-bottom: none;
    transition: all 0.15s;
    background: transparent;
  }
  .game-tab.active {
    color: var(--accent);
    background: var(--bg);
    border-color: var(--sep);
    border-bottom-color: var(--bg);
    margin-bottom: -1px;
    position: relative;
    z-index: 1;
  }

  /* ---- NAV TABS ---- */
  .nav {
    display: flex;
    gap: 2px;
    background: var(--bg2);
    padding: 8px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--sep);
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    color: var(--hint);
    background: transparent;
    border: none;
    font-family: var(--font);
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .nav-btn.active {
    background: var(--accent);
    color: var(--accent-t);
  }

  /* ---- CONTENT ---- */
  .content {
    padding: 16px;
    display: none;
  }
  .content.active { display: block; }

  /* ---- CARDS ---- */
  .card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
    border: 1px solid var(--sep);
  }
  .card-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: 10px;
  }

  /* ---- STAT GRID ---- */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .stat-item {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
    border: 1px solid var(--sep);
  }
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 9px;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .stat-value.green { color: var(--green); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.red { color: var(--red); }
  .stat-value.accent { color: var(--accent); }

  /* ---- COOLDOWN TABLE ---- */
  .cd-row {
    display: flex;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--sep);
    gap: 8px;
  }
  .cd-row:last-child { border-bottom: none; }
  .cd-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cd-dot.ready   { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .cd-dot.soon    { background: var(--yellow); }
  .cd-dot.waiting { background: var(--hint); }
  .cd-name {
    flex: 1;
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cd-time {
    font-size: 11px;
    color: var(--hint);
    flex-shrink: 0;
  }
  .cd-time.ready { color: var(--green); font-weight: 700; }
  .cd-time.soon  { color: var(--yellow); }

  .cd-filter {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .filter-btn {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--sep);
    background: transparent;
    color: var(--hint);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent);
    color: var(--accent-t);
    border-color: var(--accent);
  }

  /* ---- BG STATS ---- */
  .bg-bar-wrap {
    margin-bottom: 10px;
  }
  .bg-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--hint);
    margin-bottom: 4px;
  }
  .bg-label span:last-child { color: var(--text); font-weight: 600; }
  .bg-bar-track {
    height: 6px;
    background: var(--sep);
    border-radius: 3px;
    overflow: hidden;
  }
  .bg-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .bg-bar-fill.c { background: var(--green); }
  .bg-bar-fill.u { background: var(--yellow); }
  .bg-bar-fill.r { background: var(--red); }

  /* ---- GEM HISTORY ---- */
  .gem-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--sep);
    font-size: 12px;
  }
  .gem-row:last-child { border-bottom: none; }
  .gem-event { color: var(--hint); font-size: 10px; }
  .gem-balance { font-weight: 600; color: var(--accent); }
  .gem-date { color: var(--hint); font-size: 10px; }

  /* ---- ROI ---- */
  .roi-card {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .roi-pct {
    font-size: 28px;
    font-weight: 700;
    min-width: 80px;
  }
  .roi-pct.positive { color: var(--green); }
  .roi-pct.negative { color: var(--red); }
  .roi-details { flex: 1; }
  .roi-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    padding: 2px 0;
  }
  .roi-row span:first-child { color: var(--hint); }
  .roi-row span:last-child  { font-weight: 600; }

  /* ---- LOADING / EMPTY ---- */
  .empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--hint);
    font-size: 12px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--sep);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- PROGRESS BAR (accounts) ---- */
  .progress-wrap { margin-top: 8px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--hint);
    margin-bottom: 4px;
  }
  .progress-track {
    height: 8px;
    background: var(--sep);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
  }
  .progress-used   { background: var(--accent); height: 100%; transition: width 0.6s ease; }
  .progress-unused { background: var(--green);  height: 100%; transition: width 0.6s ease; }

  /* ---- SECTION HEADER ---- */
  .section-hdr {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--hint);
    padding: 6px 0 4px;
    border-bottom: 1px solid var(--sep);
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-title">⚙ Crafter</span>
    <span class="sync-badge" id="syncBadge">loading…</span>
  </div>
  <div class="game-tabs" id="gameTabs"></div>
</div>

<div class="nav" id="nav">
  <button class="nav-btn active" data-tab="cooldown">Cooldown</button>
  <button class="nav-btn" data-tab="accounts">Accounts</button>
  <button class="nav-btn" data-tab="backgrounds">Backgrounds</button>
  <button class="nav-btn" data-tab="roi">ROI</button>
  <button class="nav-btn" data-tab="gems">Gems</button>
</div>

<div id="cooldown"    class="content active"></div>
<div id="accounts"   class="content"></div>
<div id="backgrounds" class="content"></div>
<div id="roi"        class="content"></div>
<div id="gems"       class="content"></div>

<script>
// ============================================================
//  TELEGRAM INIT
// ============================================================
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

// ============================================================
//  CONFIG — set your GitHub raw URL here
// ============================================================
const DATA_URL = 'https://raw.githubusercontent.com/Lutsar/crafter-dashboard/main/sync-data.json';
const CD_HOURS = 24;

// ============================================================
//  STATE
// ============================================================
let DATA        = null;
let activeGame  = 0;
let activeTab   = 'cooldown';
let cdFilter    = 'all'; // all | ready | waiting

// ============================================================
//  FETCH DATA
// ============================================================
async function loadData() {
  setBadge('loading…', false);
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    const ago = timeSince(new Date(DATA.syncedAt));
    setBadge('synced ' + ago, true);
    buildGameTabs();
    render();
  } catch (err) {
    setBadge('offline', false);
    document.getElementById(activeTab).innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div>Could not load data.<br>' + err.message + '</div>';
  }
}

function setBadge(text, fresh) {
  const el = document.getElementById('syncBadge');
  el.textContent = text;
  el.className = 'sync-badge' + (fresh ? ' fresh' : '');
}

function timeSince(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60)   return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}

// ============================================================
//  GAME TABS
// ============================================================
function buildGameTabs() {
  const container = document.getElementById('gameTabs');
  container.innerHTML = '';
  if (!DATA?.games?.length) return;
  DATA.games.forEach((game, i) => {
    const btn = document.createElement('button');
    btn.className = 'game-tab' + (i === activeGame ? ' active' : '');
    btn.textContent = game.name;
    btn.onclick = () => { activeGame = i; buildGameTabs(); render(); };
    container.appendChild(btn);
  });
}

// ============================================================
//  NAV
// ============================================================
document.getElementById('nav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if (!btn) return;
  activeTab = btn.dataset.tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.querySelectorAll('.content').forEach(c => c.classList.toggle('active', c.id === activeTab));
  render();
});

// ============================================================
//  RENDER DISPATCHER
// ============================================================
function render() {
  if (!DATA) return;
  const game = DATA.games?.[activeGame];
  switch (activeTab) {
    case 'cooldown':    renderCooldown(game); break;
    case 'accounts':    renderAccounts(game); break;
    case 'backgrounds': renderBackgrounds(game); break;
    case 'roi':         renderROI(game); break;
    case 'gems':        renderGems(); break;
  }
}

// ============================================================
//  COOLDOWN
// ============================================================
function renderCooldown(game) {
  const el = document.getElementById('cooldown');
  if (!game?.accounts?.length) { el.innerHTML = empty('No craft data yet'); return; }

  const now   = Date.now();
  const cdMs  = CD_HOURS * 3600000;

  const rows = game.accounts.map(acc => {
    const last   = new Date(acc.lastCraft).getTime();
    const msLeft = (last + cdMs) - now;
    return { ...acc, msLeft, isReady: msLeft <= 0 };
  }).sort((a, b) => a.msLeft - b.msLeft);

  const readyCount = rows.filter(r => r.isReady).length;
  const soonCount  = rows.filter(r => !r.isReady && r.msLeft < 3 * 3600000).length;

  let html = `
    <div class="card">
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-value green">${readyCount}</div>
          <div class="stat-label">Ready</div>
        </div>
        <div class="stat-item">
          <div class="stat-value yellow">${soonCount}</div>
          <div class="stat-label">Soon (&lt;3h)</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${rows.length - readyCount}</div>
          <div class="stat-label">On CD</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="cd-filter">
        <button class="filter-btn ${cdFilter==='all'?'active':''}" onclick="setCDFilter('all')">All</button>
        <button class="filter-btn ${cdFilter==='ready'?'active':''}" onclick="setCDFilter('ready')">Ready</button>
        <button class="filter-btn ${cdFilter==='waiting'?'active':''}" onclick="setCDFilter('waiting')">Waiting</button>
      </div>`;

  const filtered = rows.filter(r => {
    if (cdFilter === 'ready')   return r.isReady;
    if (cdFilter === 'waiting') return !r.isReady;
    return true;
  });

  filtered.forEach(r => {
    const dot  = r.isReady ? 'ready' : r.msLeft < 3*3600000 ? 'soon' : 'waiting';
    const time = r.isReady ? 'READY' : fmtMs(r.msLeft);
    const cls  = r.isReady ? 'ready' : r.msLeft < 3*3600000 ? 'soon' : '';
    html += `<div class="cd-row">
      <div class="cd-dot ${dot}"></div>
      <div class="cd-name">${r.username}</div>
      <div class="cd-time ${cls}">${time}</div>
    </div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}

window.setCDFilter = function(f) { cdFilter = f; renderCooldown(DATA?.games?.[activeGame]); };

function fmtMs(ms) {
  if (ms <= 0) return 'READY';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}

// ============================================================
//  ACCOUNTS
// ============================================================
function renderAccounts(game) {
  const el = document.getElementById('accounts');
  if (!game) { el.innerHTML = empty('No data'); return; }

  const accs    = game.accounts || [];
  const now     = Date.now();
  const cdMs    = CD_HOURS * 3600000;
  const ready   = accs.filter(a => (now - new Date(a.lastCraft).getTime()) >= cdMs).length;
  const onCd    = accs.length - ready;
  const bs      = game.badgeStats;

  let html = `
    <div class="card">
      <div class="card-title">BP Crafters</div>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-value green">${ready}</div>
          <div class="stat-label">Ready</div>
        </div>
        <div class="stat-item">
          <div class="stat-value yellow">${onCd}</div>
          <div class="stat-label">On CD</div>
        </div>
        <div class="stat-item">
          <div class="stat-value accent">${game.totalCrafted ?? '?'}</div>
          <div class="stat-label">Total crafted</div>
        </div>
      </div>
    </div>`;

  if (bs) {
    const total   = bs.total   || 1;
    const usedPct  = Math.round((bs.hasBadge / total) * 100);
    const unusedPct = Math.round((bs.noBadge  / total) * 100);
    html += `
      <div class="card">
        <div class="card-title">Badge Accounts</div>
        <div class="stat-grid" style="margin-bottom:12px">
          <div class="stat-item">
            <div class="stat-value accent">${bs.hasBadge ?? '?'}</div>
            <div class="stat-label">Used</div>
          </div>
          <div class="stat-item">
            <div class="stat-value green">${bs.noBadge ?? '?'}</div>
            <div class="stat-label">Unused</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${bs.total ?? '?'}</div>
            <div class="stat-label">Total</div>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-label">
            <span>Used ${usedPct}%</span>
            <span>Unused ${unusedPct}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-used"   style="width:${usedPct}%"></div>
            <div class="progress-unused" style="width:${unusedPct}%"></div>
          </div>
        </div>
        ${bs.availableForCraft != null ? `<div style="margin-top:10px;font-size:12px;color:var(--green)">▸ ${bs.availableForCraft} available for next craft</div>` : ''}
      </div>`;
  }

  el.innerHTML = html;
}

// ============================================================
//  BACKGROUNDS
// ============================================================
function renderBackgrounds(game) {
  const el  = document.getElementById('backgrounds');
  const bgs = game?.backgroundStats;
  if (!bgs?.length) { el.innerHTML = empty('No background data yet'); return; }

  const withData = bgs.filter(b => (b.background_1||0)+(b.background_2||0)+(b.background_3||0) > 0);
  const total    = bgs.length;
  const withDrops = withData.length;

  const avg = key => withData.length
    ? (withData.reduce((s,b) => s + (b[key]||0), 0) / withData.length)
    : 0;

  const a1 = avg('background_1');
  const a2 = avg('background_2');
  const a3 = avg('background_3');
  const maxAvg = Math.max(a1, a2, a3, 0.01);

  const cardsPerSet = 5; // default, used for avg%
  const p = n => (n / cardsPerSet * 100).toFixed(1);

  let html = `
    <div class="card">
      <div class="card-title">Drop Averages  <span style="color:var(--text);font-size:10px">(${withDrops}/${total} accounts with data)</span></div>
      <div class="bg-bar-wrap">
        <div class="bg-label"><span>Common (55% rate)</span><span>${a1.toFixed(2)} avg · ${p(a1)}%</span></div>
        <div class="bg-bar-track"><div class="bg-bar-fill c" style="width:${(a1/maxAvg*100).toFixed(1)}%"></div></div>
      </div>
      <div class="bg-bar-wrap">
        <div class="bg-label"><span>Uncommon (27% rate)</span><span>${a2.toFixed(2)} avg · ${p(a2)}%</span></div>
        <div class="bg-bar-track"><div class="bg-bar-fill u" style="width:${(a2/maxAvg*100).toFixed(1)}%"></div></div>
      </div>
      <div class="bg-bar-wrap">
        <div class="bg-label"><span>Rare (18% rate)</span><span>${a3.toFixed(2)} avg · ${p(a3)}%</span></div>
        <div class="bg-bar-track"><div class="bg-bar-fill r" style="width:${(a3/maxAvg*100).toFixed(1)}%"></div></div>
      </div>
    </div>`;

  // Per-account table (latest 20)
  const sorted = [...bgs].sort((a,b) => new Date(b.logged_at) - new Date(a.logged_at)).slice(0, 20);
  html += `<div class="card"><div class="card-title">Per Account (latest 20)</div>`;
  sorted.forEach(b => {
    const tot = (b.background_1||0)+(b.background_2||0)+(b.background_3||0);
    html += `<div class="cd-row">
      <div class="cd-name">${b.account}</div>
      <div class="cd-time">${b.background_1||0} / ${b.background_2||0} / ${b.background_3||0}
        <span style="color:var(--hint);margin-left:6px">${tot}</span></div>
    </div>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

// ============================================================
//  ROI
// ============================================================
function renderROI(game) {
  const el = document.getElementById('roi');
  el.innerHTML = `<div class="empty"><span class="spinner"></span>Fetching live prices…</div>`;

  if (!game) { el.innerHTML = empty('No game data'); return; }

  // Build hash names from game config embedded in DATA (if available) or fallback
  const backgrounds = game.backgrounds || [];

  // Fetch prices from Steam Market API
  const fetchPrice = (hashName) => {
    const url = 'https://steamcommunity.com/market/priceoverview/?appid=753&currency=1&market_hash_name=' + encodeURIComponent(hashName);
    return fetch(url).then(r => r.json()).catch(() => ({}));
  };

  const gemsHash = '753-Sack of Gems';

  Promise.all([
    fetchPrice(gemsHash),
    ...backgrounds.map(b => fetchPrice(b.hashName)),
  ]).then(([gemsData, ...bgDatas]) => {
    const parsePrice = s => s ? parseFloat(String(s).replace(/[^0-9.]/g,'')) || 0 : 0;
    const gemsPrice  = parsePrice(gemsData.lowest_price || gemsData.median_price);
    const bgPrices   = bgDatas.map(d => parsePrice(d.lowest_price || d.median_price));
    const [p1, p2, p3] = bgPrices;

    const gemsRequired = game.gemsRequired || 1200;
    const cardsPerSet  = game.cardsPerSet  || 5;
    const r2           = n => Math.round(n * 100) / 100;

    const setCost = r2((gemsRequired / 3) * (gemsPrice / 1000) * 5 * cardsPerSet);
    const spinPrc = r2(setCost / cardsPerSet);
    const netEV   = r2((p1 * 0.55 + p2 * 0.27 + p3 * 0.18) * 0.87);
    const roi     = spinPrc > 0 ? r2(((netEV - spinPrc) / spinPrc) * 100) : null;

    const sign    = roi >= 0 ? '+' : '';
    const roiCls  = roi >= 0 ? 'positive' : 'negative';

    const bgNames = backgrounds.map(b => b.hashName || b.key);

    el.innerHTML = `
      <div class="card">
        <div class="card-title">Live ROI — ${game.name}</div>
        <div class="roi-card">
          <div class="roi-pct ${roiCls}">${roi != null ? sign+roi.toFixed(1)+'%' : '?'}</div>
          <div class="roi-details">
            <div class="roi-row"><span>netEV</span><span>$${netEV}</span></div>
            <div class="roi-row"><span>spinPrc</span><span>$${spinPrc}</span></div>
            <div class="roi-row"><span>setCost</span><span>$${setCost}</span></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Price Breakdown</div>
        <div class="roi-row"><span>Gems sack</span><span>$${gemsPrice}</span></div>
        <div class="roi-row"><span>${bgNames[0]||'Common'}</span><span>$${p1}</span></div>
        <div class="roi-row"><span>${bgNames[1]||'Uncommon'}</span><span>$${p2}</span></div>
        <div class="roi-row"><span>${bgNames[2]||'Rare'}</span><span>$${p3}</span></div>
      </div>
      <div class="card">
        <div class="card-title">Formula</div>
        <div style="font-size:10px;color:var(--hint);line-height:1.8">
          netEV = (C×0.55 + U×0.27 + R×0.18) × 0.87<br>
          setCost = (gemsReq/3) × (gemsPrc/1000) × 5 × cardsPerSet<br>
          spinPrc = setCost / cardsPerSet<br>
          ROI = ((netEV − spinPrc) / spinPrc) × 100
        </div>
      </div>`;
  }).catch(err => {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Price fetch failed.<br>${err.message}<br><br><small style="color:var(--hint)">Note: Steam market API may block direct browser requests. Use the /roi bot command instead.</small></div>`;
  });
}

// ============================================================
//  GEMS HISTORY
// ============================================================
function renderGems() {
  const el = document.getElementById('gems');
  if (!DATA) { el.innerHTML = empty('No data'); return; }

  const balance = DATA.latestGemBalance;
  const spent   = DATA.totalGemsSpent;

  let html = `
    <div class="card">
      <div class="stat-grid">
        <div class="stat-item" style="grid-column:span 2">
          <div class="stat-value accent" style="font-size:26px">${balance != null ? balance.toLocaleString() : '?'}</div>
          <div class="stat-label">Current Gems</div>
        </div>
        <div class="stat-item">
          <div class="stat-value yellow">${spent != null ? (spent/1000).toFixed(1)+'k' : '?'}</div>
          <div class="stat-label">Total Spent</div>
        </div>
      </div>
    </div>`;

  // Per-game totals
  if (DATA.games?.length) {
    html += `<div class="card"><div class="card-title">Per Game</div>`;
    DATA.games.forEach(g => {
      const gemsSpent = (g.totalCrafted || 0) * (g.gemsRequired || 0);
      html += `<div class="gem-row">
        <span>${g.name}</span>
        <div style="text-align:right">
          <div class="gem-balance">${gemsSpent.toLocaleString()} gems</div>
          <div class="gem-event">${g.totalCrafted || 0} crafts</div>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

// ============================================================
//  HELPERS
// ============================================================
function empty(msg) {
  return `<div class="empty"><div class="empty-icon">📭</div>${msg}</div>`;
}

// ============================================================
//  INIT
// ============================================================
loadData();
// Refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
</script>
